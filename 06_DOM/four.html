<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    // creating function to add language

    function addLanguage (langName){
       const li = document.createElement('li')
       li.innerHTML = `${langName}`
       document.querySelector('.language').appendChild(li)
    }
    addLanguage("python");
    addLanguage("java")

    // optimised way

    function addOptiLanguage (langName) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("Ruby")

    // Edit

    const secChild = document.querySelector('li:nth-child(2)')
    const newLi = document.createElement('li')
    newLi.textContent = "Mojo"
    secChild.replaceWith(newLi)

    // // one more example of edit

    const FirstChild = document.querySelector('li:nth-child(1)')
    const oneLi = document.createElement('li')
    oneLi.textContent = "TypeScript"
    FirstChild.replaceWith(oneLi)

// Remove element

const lastLang = document.querySelector('li:last-child')
lastLang.remove()
</script>
</html>
