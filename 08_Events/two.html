<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Events</title>
</head>
<body>
    <h1>Chai Aur Code</h1>
    <button id="stop">Stop</button>
</body>
<script>
    setTimeout(function (){
        console.log("ansh");
        
    }, 2000)

    // another way 

    const SayMyName= function (){
        console.log("I Am Ansh Patel");
        
    }
    setTimeout(SayMyName, 2000);

    // change H1 Text after 2 sec
    const ChangeText = function(){
        document.querySelector('h1').innerHTML = "Best Js Series"
    }
    const StopChanging = setTimeout(ChangeText, 4000);

    // Stop this H1 change using Stop button

    document.querySelector('#stop').addEventListener('click', function(){
        clearTimeout(StopChanging);
        console.log("Stopped");
        
    })
</script>
</html>
